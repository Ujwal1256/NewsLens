version: "3.9"

services:
  app:
    build: .
    container_name: newslens-api

    ports:
      - "5000:5000"

    env_file:
      - .env.docker

    depends_on:
      - mongodb

    restart: unless-stopped

  mongodb:
    image: mongo:8

    container_name: newslens-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    restart: unless-stopped

volumes:
  mongodb_data: